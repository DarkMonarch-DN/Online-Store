version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - db_host=db
      - redis_host=redis
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=online_store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # Оптимизация PostgreSQL
    command: postgres -c shared_buffers=128MB -c effective_cache_size=384MB

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    # Оптимизация Redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
